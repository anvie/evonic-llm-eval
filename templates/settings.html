{% extends "base.html" %}

{% block content %}
<div class="settings-container">
    <div class="settings-header">
        <h2>⚙️ Test Settings</h2>
        <div class="settings-actions">
            <button onclick="exportTests()" class="btn-secondary">Export Tests</button>
            <button onclick="showImportModal()" class="btn-secondary">Import Tests</button>
            <button onclick="syncToDb()" class="btn-primary">Sync to Database</button>
        </div>
    </div>

    <div class="settings-tabs">
        <button class="tab-btn active" onclick="showTab('domains')">Domains</button>
        <button class="tab-btn" onclick="showTab('evaluators')">Evaluators</button>
    </div>

    <!-- Domains Tab -->
    <div id="domains-tab" class="tab-content active">
        <div class="domains-list" id="domains-list">
            <!-- Domains will be loaded here -->
        </div>
        <button onclick="showAddDomainModal()" class="btn-add">+ Add Domain</button>
    </div>

    <!-- Evaluators Tab -->
    <div id="evaluators-tab" class="tab-content">
        <div class="evaluators-list" id="evaluators-list">
            <!-- Evaluators will be loaded here -->
        </div>
        <button onclick="showAddEvaluatorModal()" class="btn-add">+ Add Custom Evaluator</button>
    </div>
</div>

<!-- Domain Modal -->
<div id="domain-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="domain-modal-title">Add Domain</h3>
            <button onclick="closeModal('domain-modal')" class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
            <form id="domain-form">
                <input type="hidden" id="domain-id">
                <div class="form-group">
                    <label>ID</label>
                    <input type="text" id="domain-id-input" placeholder="e.g., math (auto-generated if empty)">
                </div>
                <div class="form-group">
                    <label>Name *</label>
                    <input type="text" id="domain-name" required placeholder="e.g., Mathematics">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="domain-description" rows="3" placeholder="Domain description"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Icon</label>
                        <select id="domain-icon">
                            <option value="chat">💬 Chat</option>
                            <option value="calculator">🔢 Calculator</option>
                            <option value="database">🗄️ Database</option>
                            <option value="wrench">🔧 Wrench</option>
                            <option value="brain">🧠 Brain</option>
                            <option value="code">💻 Code</option>
                            <option value="file">📄 File</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Color</label>
                        <input type="color" id="domain-color" value="#3B82F6">
                    </div>
                </div>
                <div class="form-group">
                    <label>Default Evaluator</label>
                    <select id="domain-evaluator">
                        <!-- Evaluators will be loaded here -->
                    </select>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="domain-enabled" checked> Enabled
                    </label>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button onclick="closeModal('domain-modal')" class="btn-secondary">Cancel</button>
            <button onclick="saveDomain()" class="btn-primary">Save Domain</button>
        </div>
    </div>
</div>

<!-- Test Modal -->
<div id="test-modal" class="modal">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h3 id="test-modal-title">Add Test</h3>
            <button onclick="closeModal('test-modal')" class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
            <form id="test-form">
                <input type="hidden" id="test-id">
                <div class="form-row">
                    <div class="form-group">
                        <label>Domain</label>
                        <select id="test-domain" required>
                            <!-- Domains will be loaded here -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Level</label>
                        <select id="test-level" required>
                            <option value="1">Level 1</option>
                            <option value="2">Level 2</option>
                            <option value="3">Level 3</option>
                            <option value="4">Level 4</option>
                            <option value="5">Level 5</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Test ID</label>
                    <input type="text" id="test-id-input" placeholder="Auto-generated if empty">
                </div>
                <div class="form-group">
                    <label>Name *</label>
                    <input type="text" id="test-name" required placeholder="Test name">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="test-description" placeholder="Brief description">
                </div>
                <div class="form-group">
                    <label>Prompt *</label>
                    <textarea id="test-prompt" rows="4" required placeholder="The prompt to send to the LLM"></textarea>
                </div>
                <div class="form-group">
                    <label>Expected (JSON)</label>
                    <textarea id="test-expected" rows="4" placeholder='{"answer": 42, "type": "numeric"}'></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Evaluator</label>
                        <select id="test-evaluator">
                            <!-- Evaluators will be loaded here -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Timeout (ms)</label>
                        <input type="number" id="test-timeout" value="30000">
                    </div>
                    <div class="form-group">
                        <label>Weight</label>
                        <input type="number" id="test-weight" value="1.0" step="0.1">
                    </div>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="test-enabled" checked> Enabled
                    </label>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button onclick="closeModal('test-modal')" class="btn-secondary">Cancel</button>
            <button onclick="saveTest()" class="btn-primary">Save Test</button>
        </div>
    </div>
</div>

<!-- Evaluator Modal -->
<div id="evaluator-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="evaluator-modal-title">Add Custom Evaluator</h3>
            <button onclick="closeModal('evaluator-modal')" class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
            <form id="evaluator-form">
                <input type="hidden" id="evaluator-id">
                <div class="form-group">
                    <label>ID</label>
                    <input type="text" id="evaluator-id-input" placeholder="Auto-generated if empty">
                </div>
                <div class="form-group">
                    <label>Name *</label>
                    <input type="text" id="evaluator-name" required placeholder="Evaluator name">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="evaluator-description" placeholder="Brief description">
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select id="evaluator-type" onchange="toggleEvaluatorType()">
                        <option value="custom">Custom</option>
                    </select>
                </div>
                <div class="form-group" id="eval-prompt-group">
                    <label>Evaluation Prompt</label>
                    <textarea id="evaluator-prompt" rows="5" placeholder="Prompt template for LLM evaluation. Use {response} and {expected} as placeholders."></textarea>
                    <small>Use {response}, {expected}, {level} as placeholders</small>
                </div>
                <div class="form-group" id="eval-regex-group">
                    <label>Extraction Regex</label>
                    <input type="text" id="evaluator-regex" placeholder="SCORE:\s*(\d+)">
                    <small>Regex pattern with capture group for score extraction</small>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button onclick="closeModal('evaluator-modal')" class="btn-secondary">Cancel</button>
            <button onclick="saveEvaluator()" class="btn-primary">Save Evaluator</button>
        </div>
    </div>
</div>

<!-- Import Modal -->
<div id="import-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Import Tests</h3>
            <button onclick="closeModal('import-modal')" class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Import JSON</label>
                <textarea id="import-json" rows="10" placeholder="Paste exported JSON here..."></textarea>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="import-merge" checked> Merge with existing tests
                </label>
            </div>
        </div>
        <div class="modal-footer">
            <button onclick="closeModal('import-modal')" class="btn-secondary">Cancel</button>
            <button onclick="importTests()" class="btn-primary">Import</button>
        </div>
    </div>
</div>

<script>
// State
let domains = [];
let evaluators = [];

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    loadDomains();
    loadEvaluators();
});

// Tab Management
function showTab(tabName) {
    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    
    document.getElementById(`${tabName}-tab`).classList.add('active');
    document.querySelector(`[onclick="showTab('${tabName}')"]`).classList.add('active');
}

// Modal Management
function openModal(modalId) {
    document.getElementById(modalId).classList.add('active');
}

function closeModal(modalId) {
    document.getElementById(modalId).classList.remove('active');
}

// API Calls
async function apiGet(url) {
    const response = await fetch(url);
    return response.json();
}

async function apiPost(url, data) {
    const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });
    return response.json();
}

async function apiPut(url, data) {
    const response = await fetch(url, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });
    return response.json();
}

async function apiDelete(url) {
    const response = await fetch(url, { method: 'DELETE' });
    return response.json();
}

// Load Data
async function loadDomains() {
    try {
        const data = await apiGet('/api/settings/domains');
        domains = data.domains || [];
        renderDomains();
    } catch (error) {
        console.error('Error loading domains:', error);
    }
}

async function loadEvaluators() {
    try {
        const data = await apiGet('/api/settings/evaluators');
        evaluators = data.evaluators || [];
        renderEvaluators();
        updateEvaluatorSelects();
    } catch (error) {
        console.error('Error loading evaluators:', error);
    }
}

// Render Functions
function renderDomains() {
    const container = document.getElementById('domains-list');
    
    if (domains.length === 0) {
        container.innerHTML = '<div class="loading">No domains found. Click "Add Domain" to create one.</div>';
        return;
    }
    
    container.innerHTML = domains.map(domain => `
        <div class="domain-card">
            <div class="domain-header" onclick="toggleDomainTests('${domain.id}')">
                <div class="domain-info">
                    <div class="domain-icon" style="background: ${domain.color}">${getDomainIcon(domain.icon)}</div>
                    <div class="domain-meta">
                        <h3>${domain.name} ${!domain.enabled ? '(Disabled)' : ''}</h3>
                        <p>${domain.description || 'No description'}</p>
                    </div>
                </div>
                <div class="domain-stats">
                    <div class="stat">
                        <div class="stat-value">${domain.total_tests || 0}</div>
                        <div class="stat-label">Tests</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">${domain.levels ? Object.keys(domain.levels).length : 0}</div>
                        <div class="stat-label">Levels</div>
                    </div>
                </div>
                <div class="domain-actions">
                    <button class="btn-icon" onclick="event.stopPropagation(); editDomain('${domain.id}')">✏️ Edit</button>
                    <button class="btn-icon delete" onclick="event.stopPropagation(); deleteDomain('${domain.id}')">🗑️</button>
                </div>
            </div>
            <div class="domain-tests" id="domain-tests-${domain.id}">
                ${renderLevelGroups(domain)}
            </div>
        </div>
    `).join('');
}

function renderLevelGroups(domain) {
    return [1, 2, 3, 4, 5].map(level => {
        const testCount = domain.levels ? (domain.levels[level] || 0) : 0;
        return `
            <div class="level-group">
                <div class="level-header">
                    <span>Level ${level} (${testCount} tests)</span>
                    <button class="btn-secondary" onclick="showAddTestModal('${domain.id}', ${level})">+ Add Test</button>
                </div>
                <div class="level-tests" id="level-tests-${domain.id}-${level}">
                    <span class="loading">Loading...</span>
                </div>
            </div>
        `;
    }).join('');
}

function renderEvaluators() {
    const container = document.getElementById('evaluators-list');
    
    if (evaluators.length === 0) {
        container.innerHTML = '<div class="loading">No evaluators found.</div>';
        return;
    }
    
    container.innerHTML = evaluators.map(evaluator => `
        <div class="evaluator-card">
            <div class="evaluator-info">
                <h4>${evaluator.name} <span class="evaluator-type ${evaluator.type}">${evaluator.type}</span></h4>
                <p>${evaluator.description || 'No description'}</p>
            </div>
            <div class="evaluator-actions">
                ${evaluator.type === 'custom' ? `
                    <button class="btn-icon" onclick="editEvaluator('${evaluator.id}')">✏️ Edit</button>
                    <button class="btn-icon delete" onclick="deleteEvaluator('${evaluator.id}')">🗑️</button>
                ` : ''}
            </div>
        </div>
    `).join('');
}

function updateEvaluatorSelects() {
    const selects = ['domain-evaluator', 'test-evaluator'];
    selects.forEach(selectId => {
        const select = document.getElementById(selectId);
        if (select) {
            select.innerHTML = '<option value="">-- Select Evaluator --</option>' +
                evaluators.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
        }
    });
}

// Domain Functions
function showAddDomainModal() {
    document.getElementById('domain-modal-title').textContent = 'Add Domain';
    document.getElementById('domain-form').reset();
    document.getElementById('domain-id').value = '';
    openModal('domain-modal');
}

function editDomain(domainId) {
    const domain = domains.find(d => d.id === domainId);
    if (!domain) return;
    
    document.getElementById('domain-modal-title').textContent = 'Edit Domain';
    document.getElementById('domain-id').value = domain.id;
    document.getElementById('domain-id-input').value = domain.id;
    document.getElementById('domain-name').value = domain.name;
    document.getElementById('domain-description').value = domain.description || '';
    document.getElementById('domain-icon').value = domain.icon || 'file';
    document.getElementById('domain-color').value = domain.color || '#3B82F6';
    document.getElementById('domain-evaluator').value = domain.evaluator_id || '';
    document.getElementById('domain-enabled').checked = domain.enabled !== false;
    
    openModal('domain-modal');
}

async function saveDomain() {
    const id = document.getElementById('domain-id').value || null;
    const data = {
        id: document.getElementById('domain-id-input').value || undefined,
        name: document.getElementById('domain-name').value,
        description: document.getElementById('domain-description').value,
        icon: document.getElementById('domain-icon').value,
        color: document.getElementById('domain-color').value,
        evaluator_id: document.getElementById('domain-evaluator').value,
        enabled: document.getElementById('domain-enabled').checked
    };
    
    try {
        let result;
        if (id) {
            result = await apiPut(`/api/settings/domains/${id}`, data);
        } else {
            result = await apiPost('/api/settings/domains', data);

function toggleDomainTests(domainId) {
    const testsDiv = document.getElementById(`domain-tests-${domainId}`);
    testsDiv.classList.toggle('expanded');
    
    if (testsDiv.classList.contains('expanded')) {
        loadDomainTests(domainId);
    }
}

async function loadDomainTests(domainId) {
    try {
        const data = await apiGet(`/api/settings/tests?domain=${domainId}`);
        const tests = data.tests || [];
        
        // Group by level
        const byLevel = {};
        tests.forEach(test => {
            if (!byLevel[test.level]) byLevel[test.level] = [];
            byLevel[test.level].push(test);
        });
        
        // Render each level
        [1, 2, 3, 4, 5].forEach(level => {
            const container = document.getElementById(`level-tests-${domainId}-${level}`);
            const levelTests = byLevel[level] || [];
            
            if (levelTests.length === 0) {
                container.innerHTML = '<span style="color: #888">No tests</span>';
            } else {
                container.innerHTML = levelTests.map(test => `
                    <div class="test-item ${!test.enabled ? 'disabled' : ''}" onclick="editTest('${test.id}', '${domainId}')">
                        <span class="test-status ${!test.enabled ? 'disabled' : ''}"></span>
                        ${test.name}
                    </div>
                `).join('');
            }
        });
    } catch (error) {
        console.error('Error loading tests:', error);
    }
}

async function editTest(testId, domainId) {
    try {
        const test = await apiGet(`/api/settings/tests/${testId}`);
        
        document.getElementById('test-modal-title').textContent = 'Edit Test';
        document.getElementById('test-id').value = test.id;
        document.getElementById('test-id-input').value = test.id;
        document.getElementById('test-domain').value = test.domain_id;
        document.getElementById('test-level').value = test.level;
        document.getElementById('test-name').value = test.name;
        document.getElementById('test-description').value = test.description || '';
        document.getElementById('test-prompt').value = test.prompt;
        document.getElementById('test-expected').value = test.expected ? JSON.stringify(test.expected, null, 2) : '';
        document.getElementById('test-evaluator').value = test.evaluator_id || '';
        document.getElementById('test-timeout').value = test.timeout_ms || 30000;

async function saveTest() {
    const testId = document.getElementById('test-id').value || null;
    
    let expected = null;
    try {
        const expectedText = document.getElementById('test-expected').value.trim();
        if (expectedText) {
            expected = JSON.parse(expectedText);
        }
    } catch (e) {
        alert('Invalid JSON in Expected field');
        return;
    }
    
    const data = {
        id: document.getElementById('test-id-input').value || undefined,
        domain_id: document.getElementById('test-domain').value,
        level: parseInt(document.getElementById('test-level').value),
        name: document.getElementById('test-name').value,
        description: document.getElementById('test-description').value,
        prompt: document.getElementById('test-prompt').value,
        expected: expected,
        evaluator_id: document.getElementById('test-evaluator').value,
        timeout_ms: parseInt(document.getElementById('test-timeout').value),
        weight: parseFloat(document.getElementById('test-weight').value),
        enabled: document.getElementById('test-enabled').checked
    };
    
    try {
        let result;
        if (testId) {
            result = await apiPut(`/api/settings/tests/${testId}`, data);
        } else {
            result = await apiPost('/api/settings/tests', data);
        }
        
        if (result.success) {
            closeModal('test-modal');
            loadDomains();
        } else {
            alert('Error: ' + result.error);
        }
    } catch (error) {
        alert('Error saving test: ' + error);
    }
}

// Import/Export Functions
async function exportTests() {
    try {
        const data = await apiGet('/api/settings/export');
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `test-definitions-${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
    } catch (error) {
        alert('Error exporting tests: ' + error);
    }
}

function showImportModal() {
    document.getElementById('import-form').reset();
    openModal('import-modal');
}

async function importTests() {
    const jsonText = document.getElementById('import-json').value.trim();
    const merge = document.getElementById('import-merge').checked;
    
    if (!jsonText) {
        alert('Please paste JSON to import');
        return;
    }
    
    try {
        const data = JSON.parse(jsonText);
        data.merge = merge;
        
        const result = await apiPost('/api/settings/import', data);
        
        if (result.errors && result.errors.length > 0) {
            alert('Import completed with errors:\n' + result.errors.join('\n'));
        } else {
            alert(`Imported: ${result.domains_imported} domains, ${result.tests_imported} tests, ${result.evaluators_imported} evaluators`);
        }
        
        closeModal('import-modal');
        loadDomains();
        loadEvaluators();
    } catch (error) {
        alert('Error importing: ' + error);
    }
}

}
